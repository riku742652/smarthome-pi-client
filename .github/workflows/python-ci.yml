name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: uv をインストールする
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Python をセットアップする
        run: uv python install 3.11

      - name: 依存関係をインストールする
        run: uv sync --all-groups

      - name: ruff lint を実行する
        run: uv run ruff check .

      - name: ruff format チェックを実行する
        run: uv run ruff format --check .

      - name: pyright 型チェックを実行する
        run: uv run pyright .

      - name: pytest を実行する
        run: uv run pytest tests/ -v --cov=ble_scanner --cov-report=term-missing --cov-fail-under=85
